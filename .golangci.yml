version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/gumeniukcom/golang-jsonrpc2

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
