name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # weekly: new vulnerabilities appear without code changes
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.24']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # encoding/json/v2 lands as the default in a future Go release; run the
  # suite under the experiment now so the migration path stays green.
  jsonv2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Test with GOEXPERIMENT=jsonv2
        env:
          GOEXPERIMENT: jsonv2
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.10.1

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: govulncheck
        # pinned for reproducibility; bump deliberately
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  bench:
    # Informational perf-regression check: compares PR benchmarks against the
    # base branch with benchstat. Shared runners are noisy — treat deltas
    # under ~10% as noise; the job never blocks a merge.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Bench PR
        run: go test -run xxx -bench=. -benchmem -count=6 . | tee /tmp/new.txt

      - name: Bench base
        run: |
          git worktree add /tmp/base origin/${{ github.base_ref }}
          cd /tmp/base
          go test -run xxx -bench=. -benchmem -count=6 . | tee /tmp/old.txt || true

      - name: benchstat
        # pinned for reproducibility; bump deliberately
        run: go run golang.org/x/perf/cmd/benchstat@v0.0.0-20260709024250-82a0b07e230d /tmp/old.txt /tmp/new.txt
