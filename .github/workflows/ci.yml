name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # weekly: new vulnerabilities appear without code changes
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.24']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  # The Fiber adapters are separate nested modules (to keep Fiber/fasthttp
  # out of the core go.mod), so `go test ./...` at the root does not cover
  # them — test each on its own.
  adapters:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [jsonrpcfiber, jsonrpcfiberv3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Test ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

      - name: Lint ${{ matrix.module }}
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.10.1
          working-directory: ${{ matrix.module }}

      - name: govulncheck ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  # encoding/json/v2 lands as the default in a future Go release; run the
  # suite under the experiment now so the migration path (see MIGRATION.md and
  # internal/codec) stays green, including the Fiber adapter modules.
  jsonv2:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Test core with GOEXPERIMENT=jsonv2
        run: go test -race ./...

      - name: Test adapters with GOEXPERIMENT=jsonv2
        run: |
          for m in jsonrpcfiber jsonrpcfiberv3; do
            (cd "$m" && go test -race ./...)
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.10.1

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: govulncheck
        # pinned for reproducibility; bump deliberately
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  bench:
    # Informational perf-regression check: compares PR benchmarks against the
    # base branch with benchstat. Shared runners are noisy — treat deltas
    # under ~10% as noise; the job never blocks a merge.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Bench PR
        run: go test -run xxx -bench=. -benchmem -count=6 . | tee /tmp/new.txt

      - name: Bench base
        run: |
          git worktree add /tmp/base origin/${{ github.base_ref }}
          cd /tmp/base
          go test -run xxx -bench=. -benchmem -count=6 . | tee /tmp/old.txt || true

      - name: benchstat
        # pinned for reproducibility; bump deliberately
        run: go run golang.org/x/perf/cmd/benchstat@v0.0.0-20260709024250-82a0b07e230d /tmp/old.txt /tmp/new.txt
