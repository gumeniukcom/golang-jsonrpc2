# Static analysis (SAST) via CodeQL: runs on pushes and PRs to master and on
# a weekly schedule. Complements golangci-lint (style/bugs) with security
# queries; findings land in the repo's Security > Code scanning tab.
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '41 5 * * 1' # weekly, Monday 05:41 UTC

# Cancel superseded PR runs (CodeQL is the heaviest workflow here); pushes
# and scheduled runs finish their SARIF upload uncancelled.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF results to code scanning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 'stable'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go
          # manual: CodeQL 2.26 rejects 'none' for Go, and autobuild would
          # trip over the Makefile (its default target needs easyjson and
          # golangci-lint) and cover only the root module. Tracing explicit
          # builds covers every nested module deterministically.
          build-mode: manual

      - name: Build all modules (traced by CodeQL)
        run: |
          go build ./...
          (cd jsonrpcfiber && go build ./...)
          (cd jsonrpcfiberv3 && go build ./...)
          (cd benchmarks && go build ./...)

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: '/language:go'
